spring.application.name=spring-ai-test

spring.ai.dashscope.api-key=${DASHSCOPE_API_KEY}
spring.ai.dashscope.chat.options.model=deepseek-v4-pro

spring.ai.deepseek.api-key=${DEEPSEEK_API_KEY}
spring.ai.deepseek.chat.options.model=deepseek-v4-pro

logging.level.org.springframework.ai.chat=DEBUG
logging.level.org.springframework.ai.jdbc.datasource=DEBUG

spring.ai.chat.memory.repository.jdbc.initalize-schema=always
spring.ai.chat.memory.repository.jdbc.schema=classpath:/sql/schema-mysql.sql